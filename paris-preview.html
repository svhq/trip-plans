",lat:48.8608,lon:2.3595,category:"shop",day:2,address:"111 Bd Beaumarchais, 75003",note:"Iconic Parisian concept store — fashion, design, café",tip:"Go past the ground floor — the home section upstairs is where the real gems are. The Used Book Café in the basement is perfect for a coffee break. Look for local artisan pieces over mass-produced items.",mapsUrl:"https://maps.google.com/?q=Merci+Paris",hours:"10am–7pm · Sun 11am–7pm",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"The Broken Arm",lat:48.8618,lon:2.3596,category:"shop",day:2,address:"12 Rue Perrée, 75003",note:"Cult fashion and design concept store",imageUrl:"https://myparisianlife.com/wp-content/uploads/2013/09/The-Broken-Arm-Paris-Photo-500x334.jpg",mapsUrl:"https://maps.google.com/?q=The+Broken+Arm+Paris",hours:"11am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Odetta Vintage",lat:48.855,lon:2.357,category:"shop",day:2,address:"Le Marais",note:"Carefully curated vintage fashion",imageUrl:"https://bonjourparis.com/wp-content/uploads/2015/05/odette-vintage-c-site.jpg",hours:"1pm–7:30pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Maison de Vacances",lat:48.86,lon:2.351,category:"shop",day:2,address:"Le Marais, 75003",note:"Dreamy linen and home textiles",mapsUrl:"https://maps.google.com/?q=Maison+de+Vacances+Paris",hours:"10am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Antoinette Poisson",lat:48.859,lon:2.349,category:"shop",day:2,address:"Le Marais, 75003",note:"Handmade marbled paper goods and prints",hours:"11am–7pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Louise Carmen",lat:48.8615,lon:2.349,category:"shop",day:2,address:"Le Marais, 75003",note:"Feminine fashion, artsy edit",imageUrl:"https://curlytales.com/wp-content/uploads/2025/11/louise-cameron-journals.jpg",mapsUrl:"https://maps.google.com/?q=Louise+Carmen+Paris",hours:"11am–7pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Bistrot Paul Bert",lat:48.8528,lon:2.3804,category:"restaurant",day:2,address:"18 Rue Paul Bert, 75011",note:"Classic bistrot — excellent steak frites and wine list",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Bistrot_Paul_Bert%2C_6_May_2008%2C_11th_Arrondissement%2C_Paris.jpg",mapsUrl:"https://maps.google.com/?q=Bistrot+Paul+Bert+Paris",hours:"Lunch & dinner · Tue–Sat only · closed Sun–Mon",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Musée de l'Orangerie",lat:48.8638,lon:2.3225,category:"museum",day:3,address:"Jardin des Tuileries, 75001",note:"Monet's Water Lilies rooms — book timed entry online",tip:"Go first thing in the morning — the Water Lilies rooms are flooded with natural light and the experience is completely different. Monet designed the oval rooms specifically for this light. The lower level Impressionist collection is underrated and usually quiet.",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Mus%C3%A9e_de_l%E2%80%99Orangerie_exterior.JPG/640px-Mus%C3%A9e_de_l%E2%80%99Orangerie_exterior.JPG",mapsUrl:"https://maps.google.com/?q=Musee+de+Orangerie+Paris",hours:"9am–6pm · closed Tue",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Musée d'Orsay",lat:48.86,lon:2.3266,category:"museum",day:3,address:"Quai Anatole France, 75007",note:"Impressionist masterpieces — crowd flows better in afternoon",tip:"Top floor first — that's where the Van Goghs and Monets are, and crowds thin out later in the day. The building itself (a converted Belle Époque train station) is as spectacular as the art. Thursday evenings open until 9:45pm with a much smaller crowd.",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Mus%C3%A9e_Orsay_-_Paris_VII_%28FR75%29_-_2024-07-27_-_2.jpg/640px-Mus%C3%A9e_Orsay_-_Paris_VII_%28FR75%29_-_2024-07-27_-_2.jpg",mapsUrl:"https://maps.google.com/?q=Musee+d+Orsay+Paris",hours:"9:30am–6pm · Thu until 9:45pm · closed Mon",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Officine Universelle Buly",lat:48.8528,lon:2.3344,category:"shop",day:3,address:"6 Rue Bonaparte, 75006",note:"Heritage beauty apothecary — beautiful packaging",tip:"Best buys: the water-based Eau Triple perfumes, natural body oils, and personalized lip balms (they engrave on-site). The decorative combs and bath accessories make incredible gifts. The shop itself is an aesthetic experience — take your time browsing.",imageUrl:"http://buly1803.com/cdn/shop/files/Officine_Universelle_Buly_soin_beaute_parfum.jpg?v=1772189933",mapsUrl:"https://maps.google.com/?q=Officine+Universelle+Buly+Paris",hours:"10am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Debauve & Gallais",lat:48.8533,lon:2.336,category:"shop",day:3,address:"30 Rue des Saints-Pères, 75007",note:"Napoleon's chocolate shop since 1800 — a Paris original",tip:"Founded by pharmacist Sulpice Debauve, royal chocolatier to Marie-Antoinette. Try the Pistoles — thin, coin-shaped chocolates, the original recipe from 1800. The shop interior hasn't changed in 200 years. Buy a box as a gift, the packaging alone is museum-worthy.",imageUrl:"https://upload.wikimedia.org/wikipedia/en/c/c0/Debauve-et-gallais.jpg",mapsUrl:"https://maps.google.com/?q=Debauve+Gallais+Paris",hours:"10am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Loulou De Saison",lat:48.852,lon:2.339,category:"restaurant",day:3,address:"Saint-Germain, 75006",note:"Natural wine bistrot — excellent lunch",imageUrl:"https://axwwgrkdco.cloudimg.io/v7/__gmpics3__/a84135cacd874368a87e7e81d3c00949.jpeg?width=1000",mapsUrl:"https://maps.google.com/?q=Loulou+De+Saison+Paris",hours:"noon–2:30pm, 7:30–11pm · closed Sun",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Alix D. Reynis",lat:48.8545,lon:2.343,category:"shop",day:3,address:"Saint-Germain, 75006",note:"Handpainted porcelain — very special objects",mapsUrl:"https://maps.google.com/?q=Alix+D+Reynis+Paris",hours:"11am–7pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Marin Montagut",lat:48.854,lon:2.348,category:"shop",day:3,address:"Saint-Germain area",note:"Whimsical illustrated goods and ceramics",imageUrl:"http://nataliawillmott.co.uk/cdn/shop/articles/discovering-the-enchanting-world-of-marin-montagut-in-paris-6496519.jpg?v=1771430352",hours:"11am–7pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"La Maison de Commerce",lat:48.857,lon:2.35,category:"shop",day:3,address:"Saint-Germain area",note:"Design concept store",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Sonce Lab",lat:48.856,lon:2.345,category:"shop",day:3,address:"Saint-Germain area",note:"Niche perfumery",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Palais de Tokyo",lat:48.8635,lon:2.298,category:"museum",day:3,address:"13 Av. du Président Wilson, 75116",note:"Contemporary art, open until midnight — check current show",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Palais_de_Tokyo_%40_Paris_%2831028565970%29.jpg/640px-Palais_de_Tokyo_%40_Paris_%2831028565970%29.jpg",mapsUrl:"https://maps.google.com/?q=Palais+de+Tokyo+Paris",hours:"noon–midnight · closed Tue",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Monsieur Bleu",lat:48.8626,lon:2.2945,category:"restaurant",day:3,address:"Palais de Tokyo, 75116",note:"Art Deco brasserie with Seine views — book sunset slot",tip:"Book well in advance and specifically request a terrace table — not all tables face the Eiffel Tower. The 7–8pm slot catches the golden hour. Midweek evenings are less hectic. Dress the part — the room is stunning and people lean into it. Reasonable price for the quality and location.",imageUrl:"https://admin.palaisdetokyo.com/wp-content/uploads/2023/11/Image_Partage_Option_1.png",mapsUrl:"https://maps.google.com/?q=Monsieur+Bleu+Paris",hours:"noon–11pm daily",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"La Bac à Glaces",lat:48.8636,lon:2.3022,category:"restaurant",day:3,address:"Trocadéro area",note:"Ice cream worth the detour — seasonal flavours",hours:"noon–10pm · seasonal hours",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Astier de Villatte",lat:48.8637,lon:2.3371,category:"shop",day:4,address:"173 Rue Saint-Honoré, 75001",note:"Iconic ceramics and lifestyle boutique — opens 11am",tip:"All pieces are handmade using 18th and 19th century Parisian techniques — the irregularities are intentional and part of the beauty. The incense and candles are cult favourites. The shop is dark and atmospheric; let your eyes adjust. Everything is fragile, staff will wrap purchases beautifully.",imageUrl:"https://media.architecturaldigest.com/photos/58509574dcb583e908275bf6/16:9/w_1280,c_limit/astier-de-villatte_02.jpg",mapsUrl:"https://maps.google.com/?q=Astier+de+Villatte+Paris",hours:"11am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Angelina",lat:48.8648,lon:2.3282,category:"restaurant",day:4,address:"226 Rue de Rivoli, 75001",note:"Famous hot chocolate and Mont-Blanc — perfect last morning",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Angelina_cafe_Paris_4373.jpg/640px-Angelina_cafe_Paris_4373.jpg",mapsUrl:"https://maps.google.com/?q=Angelina+Paris",hours:"7:30am–7pm daily",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"The Louvre",lat:48.8606,lon:2.3376,category:"museum",day:4,address:"Rue de Rivoli, 75001",note:"Optional — even the courtyard and pyramid is worth it",tip:"If you only have an hour: enter through the Carrousel du Louvre (underground, no queue) and go straight to the Denon Wing for the Mona Lisa and Winged Victory. The pyramid at dusk is stunning even without going in. The Tuileries Garden just outside is a perfect morning walk.",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Louvre_Museum_Wikimedia_Commons.jpg/640px-Louvre_Museum_Wikimedia_Commons.jpg",mapsUrl:"https://maps.google.com/?q=Louvre+Museum+Paris",hours:"9am–6pm · closed Tue · Wed/Fri until 9:45pm",booking:"ahead",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"E. Dehillerin",lat:48.8627,lon:2.348,category:"shop",day:4,address:"18-20 Rue Coquillière, 75001",note:"Professional cookware since 1820 — Julia Child shopped here",tip:"Julia Child was a regular — the staff still remember. Ask for help; the salespeople are knowledgeable and speak some English. The copper pots and sauté pans are the headline buys. Check the bargain bin at the back for seconds at steep discounts. Bring cash for small purchases.",hours:"9am–12:30pm, 2–6pm · Sat 9am–6pm · closed Sun",booking:"walkin",mapsUrl:"https://maps.google.com/?q=E+Dehillerin+Paris",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Petit Pan",lat:48.8555,lon:2.356,category:"shop",day:4,address:"Le Marais",note:"Colourful fabric and paper goods — great gifts",imageUrl:"https://assets.alicecaroline.com/app/uploads/2015/06/Petit-Pan11.jpg",hours:"10:30am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Vintage Paris",lat:48.854,lon:2.354,category:"shop",day:4,address:"Le Marais",note:"Curated vintage pieces",hours:"11am–7pm · closed Sun–Mon",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Maison Labiche",lat:48.871,lon:2.348,category:"shop",day:4,address:"Canal area",note:"Embroidered French fashion — personalised pieces",hours:"11am–7pm · closed Sun",booking:"walkin",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Château Voltaire",lat:48.8628,lon:2.3412,category:"hotel-ref",day:null,address:"1er arrondissement",note:"Reference hotel — La Coquille d'Or bar and Émil restaurant",whyRecommended:"La Coquille d'Or bar and Émil restaurant — worth a drink or dinner if nearby",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Relais Christine",lat:48.853,lon:2.3408,category:"hotel-ref",day:null,address:"Saint-Germain, 75006",note:"Reference hotel",whyRecommended:"Saint-Germain boutique hotel — beautiful interior, great area base for future trips",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Hôtel Rochechouart",lat:48.8781,lon:2.3453,category:"hotel-ref",day:null,address:"9th arrondissement",note:"Reference hotel",whyRecommended:"Close to Hôtel Massé — worth a look for next time, stylish 9th arr. property",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Esprit Saint Germain",lat:48.854,lon:2.334,category:"hotel-ref",day:null,address:"Saint-Germain",note:"Reference hotel",whyRecommended:"Intimate Left Bank hotel — great alternative if Massé is full next trip",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Racines",lat:48.8631,lon:2.3466,category:"restaurant",day:null,address:"2nd arrondissement",note:"Natural wine, Italian-French — open evenings",whyRecommended:"One of the best natural wine lists in Paris, Italian-French kitchen — swap in for any dinner slot",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Chez Allard",lat:48.8527,lon:2.3414,category:"restaurant",day:null,address:"Saint-Germain, 75006",note:"Old school Parisian bistrot",whyRecommended:"Proper old-school Parisian bistrot, Saint-Germain — good Day 3 dinner alternative",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Chez Georges",lat:48.8643,lon:2.3453,category:"restaurant",day:null,address:"2nd arrondissement",note:"Classic bistrot, old Paris vibe",whyRecommended:"Legendary 2nd arr. bistrot, unchanged since 1964 — worth booking if Paul Bert is full",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Hôtel de Crillon",lat:48.8674,lon:2.3208,category:"hotel-ref",day:null,address:"Place de la Concorde, 75008",note:"Reference hotel",whyRecommended:"Even if not staying — the Les Ambassadeurs bar at Place de la Concorde is iconic",sourceUrl:"https://www.instagram.com/p/DU_dXwFknA5/",sourceLabel:"@sarahsolis"},{cityId:"paris",name:"Gardens of Versailles",lat:48.8049,lon:2.1204,category:"monument",day:null,address:"Versailles (30 min by RER C)",note:"Day trip option — buy tickets online",imageUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Versailles-Chateau-Jardin
